
<html>
<head>
<title>Subdomain Enumeration Report</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 30px;
    background-color: #f4f6f9;
}

h1 {
    color: #2c3e50;
    text-align: center;
}

.report-info {
    background: white;
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 20px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
}

th {
    background-color: #2c3e50;
    color: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: left;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

tr:hover {
    background-color: #e8f4ff;
}
</style>

</head>

<body>

<h1>Subdomain Enumeration Report</h1>

<div class="report-info">
    <p><strong>Target Domain:</strong> example.com</p>
    <p><strong>Total Subdomains Found:</strong> 2</p>
</div>

<table>
<tr>
<th>Subdomain</th>
<th>IP Address</th>
</tr>

<tr>
    <td>www.example.com</td>
    <td>104.20.23.154</td>
</tr>

<tr>
    <td>www.example.com</td>
    <td>172.66.147.243</td>
</tr>

</table>

</body>
</html>
